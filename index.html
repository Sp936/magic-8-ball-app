<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#140033,#000);
  color:#fff;
  text-align:center;
}

/* ✧ HEADER UPGRADE */
.header {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin-top:20px;
}

.header-ball {
  width:70px;
  height:70px;
  border-radius:50%;
  background: radial-gradient(circle,#1a1a1a,#000);
  box-shadow:0 0 30px #7c3aed, 0 0 60px #ec4899;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

/* ✧ mystical core */
.header-core {
  width:30px;
  height:30px;
  border-radius:50%;
  background:radial-gradient(circle,#c084fc,#6366f1);
  box-shadow:0 0 20px #c084fc;
}

h1 {
  font-size:1.9rem;
  margin:0;
  background:linear-gradient(90deg,#fff,#f472b6,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:0.5px;
}

/* INPUT */
input,select{
  width:85%;max-width:400px;
  padding:14px;margin:8px;
  border-radius:14px;border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

button{
  padding:14px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;
  margin:6px;
}

/* ✧ BALL UPGRADE */
.ball{
  width:230px;height:230px;
  margin:25px auto;
  border-radius:50%;
  background:radial-gradient(circle,#0a0a0a,#000);
  display:flex;align-items:center;justify-content:center;
  box-shadow:
    0 0 60px rgba(124,58,237,1),
    0 0 120px rgba(236,72,153,0.6);
  animation:breath 4s ease-in-out infinite;
}

@keyframes breath{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.03);}
}

.inner{
  width:120px;height:120px;
  background:linear-gradient(135deg,#6366f1,#c084fc);
  transform:rotate(45deg);
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#result{
  transform:rotate(-45deg);
  font-weight:bold;
}

/* DONE */
.done {
  font-size:20px;
  color:#34d399;
  animation:pop 0.4s ease;
}
@keyframes pop {
  0% { transform: scale(0.6) rotate(-45deg); opacity: 0; }
  100% { transform: scale(1) rotate(-45deg); opacity: 1; }
}

/* ✧ TASKS PERFECTLY CENTRED */
li{
  margin:12px auto;
  background:#222;
  padding:16px;
  border-radius:16px;
  max-width:320px;

  display:grid;
  grid-template-columns: 1fr auto;
  align-items:center;
}

/* true visual centre */
.task-text{
  text-align:center;
}

/* delete sits separately */
.delete-btn{
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  border:none;
  border-radius:12px;
  padding:6px 10px;
  color:white;
}

/* DRAWER */
.drawer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:15px;
  transform:translateY(calc(100% - 80px));
  transition:0.3s;
}
.drawer.open{ transform:translateY(0); }

.handle{
  width:80px;height:8px;
  background:linear-gradient(90deg,#7c3aed,#ec4899);
  margin:0 auto 12px;
  border-radius:10px;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
}
.overlay.active{
  opacity:1;
  pointer-events:auto;
}

.streak{color:#ff9edb;margin-top:10px;}

</style>
</head>

<body>

<div class="header">
  <div class="header-ball">
    <div class="header-core"></div>
  </div>
  <h1>Magic Dopamine Ball</h1>
</div>

<input id="taskInput" placeholder="Add task">

<select id="energySelect">
<option value="low">💤 Low</option>
<option value="medium">⚡ Medium</option>
<option value="high">🔥 High</option>
</select>

<button onclick="addTask()">+ Add</button>

<div class="ball" id="ball">
  <div class="inner">
    <div id="result">Ask me…</div>
  </div>
</div>

<button onclick="decide()">✨ Decide</button>
<button onclick="completeTask()">✅ I did it</button>

<div class="streak" id="streak">🔥 Streak: 0</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="handle" onclick="openDrawer()"></div>
  <ul id="taskList"></ul>
</div>

<script>
let tasks=[];
let lastChoiceIndex=null;
let streak=0;

function addTask(){
  const text=taskInput.value;
  if(text.trim()){
    tasks.push({text});
    taskInput.value="";
    render();
  }
}

function render(){
  taskList.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`
      <span class="task-text">${t.text}</span>
      <button class="delete-btn" onclick="deleteTask(${i})">✕</button>
    `;
    taskList.appendChild(li);
  });
}

function deleteTask(i){
  tasks.splice(i,1);
  render();
}

function decide(){
  if(!tasks.length) return alert("Add tasks");

  setTimeout(()=>{
    const index=Math.floor(Math.random()*tasks.length);
    lastChoiceIndex=index;
    result.textContent="👉 "+tasks[index].text;
  },500);
}

function completeTask(){
  if(lastChoiceIndex!==null){
    tasks.splice(lastChoiceIndex,1);
    render();
  }

  streak++;
  streakEl.textContent="🔥 Streak: "+streak;

  result.textContent="✨ DONE ✨";
  result.classList.add("done");

  setTimeout(()=>{
    result.classList.remove("done");
    result.textContent="Ask me…";
  },1000);
}

function openDrawer(){
  drawer.classList.add("open");
  overlay.classList.add("active");
}
function closeDrawer(){
  drawer.classList.remove("open");
  overlay.classList.remove("active");
}

const drawer=document.getElementById("drawer");
const overlay=document.getElementById("overlay");
const taskList=document.getElementById("taskList");
const taskInput=document.getElementById("taskInput");
const result=document.getElementById("result");
const streakEl=document.getElementById("streak");

render();
</script>

</body>
</html>
