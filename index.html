<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: radial-gradient(circle at top, #140033, #000);
      color: #fff;
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      margin-top: 30px;
      font-weight: 700;
      background: linear-gradient(90deg, #fff, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input, select {
      width: 85%;
      max-width: 400px;
      padding: 14px;
      margin: 8px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    button {
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
      margin: 6px;
      font-weight: 600;
    }

    .panel {
      width: 85%;
      max-width: 400px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      margin-top: 10px;
      padding: 10px;
      cursor: pointer;
    }

    .panel-content {
      display: none;
      margin-top: 10px;
    }

    .panel.active .panel-content {
      display: block;
    }

    li {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      background: rgba(255,255,255,0.08);
      padding: 10px;
      border-radius: 10px;
    }

    .ball {
      width: 260px;
      height: 260px;
      margin: 25px 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 100px rgba(124,58,237,0.9);
      transition: 0.3s;
    }

    .ball.active {
      transform: scale(1.05);
      box-shadow: 0 0 140px rgba(236,72,153,1);
    }

    .inner {
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #6366f1, #c084fc);
      transform: rotate(45deg);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #result {
      transform: rotate(-45deg);
      font-weight: bold;
    }

    .switch {
      width: 40px;
      height: 20px;
      background: #555;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      margin: 10px auto;
    }

    .switch::after {
      content: "";
      width: 16px;
      height: 16px;
      background: white;
      position: absolute;
      top: 2px;
      left: 2px;
      border-radius: 50%;
      transition: 0.2s;
    }

    .switch.active {
      background: #7c3aed;
    }

    .switch.active::after {
      left: 22px;
    }

  </style>
</head>

<body>

<h1>🔮 Magic Dopamine Ball</h1>

<div class="container">

  <input id="taskInput" placeholder="What are your options?">

  <select id="energy">
    <option value="low">💤 Low</option>
    <option value="medium">⚡ Medium</option>
    <option value="high">🔥 High</option>
  </select>

  <button onclick="addTask()">+ Add</button>

  <!-- ✧ TASK PANEL -->
  <div class="panel" onclick="togglePanel(this)">
    📋 View Tasks

    <div class="panel-content">

      <!-- ✧ save toggle -->
      <div onclick="event.stopPropagation()">
        💾 Save tasks
        <div id="switch" class="switch" onclick="toggleSave()"></div>
      </div>

      <ul id="taskList"></ul>

    </div>
  </div>

  <!-- ✧ BALL -->
  <div class="ball" id="ball">
    <div class="inner">
      <div id="result">Ask me…</div>
    </div>
  </div>

  <button onclick="decide()">✨ Decide</button>

</div>

<script>
let saveMode = localStorage.getItem("saveMode") === "true";
let tasks = saveMode ? JSON.parse(localStorage.getItem("tasks")) || [] : [];

function togglePanel(el){
  el.classList.toggle("active");
}

function toggleSave(){
  saveMode = !saveMode;
  document.getElementById("switch").classList.toggle("active", saveMode);
  localStorage.setItem("saveMode", saveMode);
}

function addTask(){
  const text = taskInput.value;
  const energy = energy.value;

  if(text.trim()){
    tasks.push({text, energy});
    taskInput.value="";
    render();
    save();
  }
}

function deleteTask(i){
  tasks.splice(i,1);
  render();
  save();
}

function save(){
  if(saveMode){
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }
}

function render(){
  const list = document.getElementById("taskList");
  list.innerHTML="";

  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`${t.text} <button onclick="deleteTask(${i})">✕</button>`;
    list.appendChild(li);
  });
}

function decide(){
  if(!tasks.length) return alert("Add tasks");

  const ball=document.getElementById("ball");
  ball.classList.add("active");

  setTimeout(()=>{
    const choice=tasks[Math.floor(Math.random()*tasks.length)];
    result.textContent="👉 "+choice.text;
    ball.classList.remove("active");
  },400);
}

render();
document.getElementById("switch").classList.toggle("active", saveMode);
</script>

</body>
</html>
