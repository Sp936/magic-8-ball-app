<!DOCTYPE html><html>
<head>
  <title>Magic 8 Ball ✨</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a0033, #000);
      color: white;
      text-align: center;
      padding: 20px;
    }h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  font-size: 1rem;
}

input {
  width: 60%;
}

button {
  background: #7c3aed;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #a78bfa;
  transform: scale(1.05);
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: rgba(255,255,255,0.1);
  margin: 5px;
  padding: 8px;
  border-radius: 8px;
}

.ball {
  width: 250px;
  height: 250px;
  margin: 30px auto;
  background: radial-gradient(circle at 30% 30%, #444, #000);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 40px rgba(124, 58, 237, 0.6);
  position: relative;
}

.inner {
  width: 120px;
  height: 120px;
  background: #4f46e5;
  transform: rotate(45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 20px;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
}

#result {
  transform: rotate(-45deg);
  font-size: 0.9rem;
  padding: 10px;
}

.shake {
  animation: shake 0.8s;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  50% { transform: translateX(10px); }
  75% { transform: translateX(-10px); }
  100% { transform: translateX(0); }
}

.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0% { opacity: 0; transform: translateY(0); }
  50% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-50px); }
}

  </style>
</head>
<body>  <h1>✨ Magic 8 Ball ✨</h1>  <input id="taskInput" placeholder="Add something to do">
  <button onclick="addTask()">Add</button>  <ul id="taskList"></ul>  <div id="ball" class="ball">
    <div class="inner">
      <div id="result">Shake me</div>
    </div>
  </div><button onclick="decide()">🔮 Decide for me</button>

  <script>
    let tasks = [];

    function addTask() {
      const input = document.getElementById("taskInput");
      const value = input.value.trim();

      if (value !== "") {
        tasks.push(value);
        input.value = "";
        renderList();
      }
    }

    function renderList() {
      const list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach(task => {
        const li = document.createElement("li");
        li.textContent = task;
        list.appendChild(li);
      });
    }

    function decide() {
      if (tasks.length === 0) {
        alert("Add some options first!");
        return;
      }

      const ball = document.getElementById("ball");
      ball.classList.add("shake");

      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * tasks.length);
        const choice = tasks[randomIndex];

        document.getElementById("result").textContent = choice;
        ball.classList.remove("shake");
        createSparkles();
      }, 800);
    }

    function createSparkles() {
      for (let i = 0; i < 10; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.style.left = Math.random() * 250 + "px";
        sparkle.style.top = Math.random() * 250 + "px";
        document.body.appendChild(sparkle);

        setTimeout(() => sparkle.remove(), 3000);
      }
    }
  </script></body>
</html>
