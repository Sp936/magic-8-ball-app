<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#140033,#000);
  color:#fff;
  text-align:center;
  overflow:hidden;
}

/* ✧ animated title */
h1{
  margin-top:30px;
  font-size:2.4rem;
  background:linear-gradient(90deg,#fff,#f472b6,#fff);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  0%{background-position:0%}
  100%{background-position:200%}
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
}

input,select{
  width:85%;
  max-width:400px;
  padding:14px;
  margin:8px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

button{
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;
  margin:6px;
}

/* ✧ ball */
.ball{
  width:260px;
  height:260px;
  margin:20px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#1a1a1a,#000);
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 0 100px rgba(124,58,237,0.9);
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.inner{
  width:140px;
  height:140px;
  background:linear-gradient(135deg,#6366f1,#c084fc);
  transform:rotate(45deg);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#result{
  transform:rotate(-45deg);
  font-weight:bold;
}

/* ✧ drawer */
.drawer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:15px;
  transform:translateY(75%);
  transition:0.3s;
}
.drawer.open{
  transform:translateY(0);
}

.handle{
  width:50px;
  height:5px;
  background:#555;
  border-radius:10px;
  margin:0 auto 10px;
}

/* ✧ particles */
.particle{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  animation:floatUp 1s linear forwards;
}
@keyframes floatUp{
  from{opacity:1}
  to{transform:translateY(-100px);opacity:0}
}

</style>
</head>

<body>

<h1>🔮 Magic Dopamine Ball</h1>

<div class="container">

<input id="taskInput" placeholder="Add task">

<select id="energy">
<option value="low">💤 Low</option>
<option value="medium">⚡ Medium</option>
<option value="high">🔥 High</option>
</select>

<select id="mode">
<option value="soft">💗 Soft</option>
<option value="strict">⚔️ Strict</option>
<option value="chaotic">🌀 Chaotic</option>
</select>

<button onclick="addTask()">+ Add</button>

<div class="ball">
  <div class="inner">
    <div id="result">Ask me…</div>
  </div>
</div>

<button onclick="decide()">✨ Decide</button>

</div>

<!-- ✧ drawer -->
<div class="drawer" id="drawer" onclick="toggleDrawer()">
<div class="handle"></div>

<ul id="taskList"></ul>

</div>

<script>
let tasks=[];

function toggleDrawer(){
  drawer.classList.toggle("open");
}

function addTask(){
  const text=taskInput.value;
  const energy=energy.value;
  if(text){
    tasks.push({text,energy});
    taskInput.value="";
    render();
  }
}

function render(){
  taskList.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`${t.text} <button onclick="tasks.splice(${i},1);render()">✕</button>`;
    taskList.appendChild(li);
  });
}

function decide(){
  if(!tasks.length) return alert("Add tasks");

  const mode=mode.value;

  let choice=tasks[Math.floor(Math.random()*tasks.length)].text;

  if(mode==="strict"){
    choice="Do this now: "+choice;
  }
  if(mode==="chaotic"){
    const extras=["NOW ⚡","no excuses","go go go","you know you should"];
    choice=choice+" "+extras[Math.floor(Math.random()*extras.length)];
  }

  result.textContent=choice;

  vibrate();
  particles();
}

function vibrate(){
  if(navigator.vibrate) navigator.vibrate([50,30,50]);
}

function particles(){
  for(let i=0;i<20;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*window.innerWidth+"px";
    p.style.top="60%";
    p.style.background=["#facc15","#a78bfa","#34d399","#f472b6"][Math.floor(Math.random()*4)];
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}
</script>

</body>
</html>
