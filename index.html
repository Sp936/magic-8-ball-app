<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#140033,#000);
  color:#fff;
  text-align:center;
}

/* ✧ HEADER (UPGRADED) */
.header {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  margin-top:20px;
}

.header-ball {
  width:60px;
  height:60px;
  border-radius:50%;
  background: radial-gradient(circle,#222,#000);
  box-shadow:0 0 25px rgba(124,58,237,1);
  display:flex;
  align-items:center;
  justify-content:center;
  animation:float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-4px);}
}

.header-inner {
  width:30px;height:30px;
  background:linear-gradient(135deg,#6366f1,#c084fc);
  transform:rotate(45deg);
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-inner span {
  transform:rotate(-45deg);
  font-size:14px;
  font-weight:bold;
}

h1 {
  font-size:1.8rem;
  margin:0;
  background:linear-gradient(90deg,#fff,#f472b6,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INPUTS */
input,select{
  width:85%;
  max-width:400px;
  padding:14px;
  margin:8px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

button{
  padding:14px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;
  margin:6px;
}

/* BALL */
.ball{
  width:220px;height:220px;
  margin:20px auto;
  border-radius:50%;
  background:radial-gradient(circle,#1a1a1a,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 80px rgba(124,58,237,1);
}
.ball.pulse{box-shadow:0 0 120px rgba(236,72,153,1);}

.inner{
  width:110px;height:110px;
  background:linear-gradient(135deg,#6366f1,#c084fc);
  transform:rotate(45deg);
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}
#result{transform:rotate(-45deg);font-weight:bold;}

/* INSTRUCTIONS */
.instructions{
  width:85%;max-width:400px;
  margin:10px auto;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
}
.instructions p{display:none;text-align:left;font-size:0.9rem;}
.instructions.active p{display:block;}

/* ✧ DRAWER FIX (PROPER) */
.drawer{
  position:fixed;
  left:0;
  width:100%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:15px;
  bottom:0;
  transform:translateY(calc(100% - 80px)); /* closed state */
  transition:transform 0.3s ease;
  box-shadow:0 -5px 40px rgba(236,72,153,0.7);
}

.drawer.open{
  transform:translateY(0);
}

.handle{
  width:80px;
  height:8px;
  background:linear-gradient(90deg,#7c3aed,#ec4899);
  margin:0 auto 12px;
  border-radius:10px;
}

li{
  display:flex;
  justify-content:space-between;
  margin:6px;
  background:#222;
  padding:10px;
  border-radius:10px;
}

.streak{color:#ff9edb;margin-top:10px;}

.particle{
  position:fixed;
  width:6px;height:6px;
  border-radius:50%;
  animation:rise 0.8s linear forwards;
}
@keyframes rise{
  from{opacity:1}
  to{transform:translateY(-80px);opacity:0}
}
</style>
</head>

<body>

<div class="header">
  <div class="header-ball">
    <div class="header-inner"><span>8</span></div>
  </div>
  <h1>Magic Dopamine Ball</h1>
</div>

<div class="instructions" onclick="this.classList.toggle('active')">
ℹ️ How to use
<p>Add tasks → choose energy → press decide.</p>
</div>

<input id="taskInput" placeholder="Add task">

<select id="energySelect">
<option value="low">💤 Low</option>
<option value="medium">⚡ Medium</option>
<option value="high">🔥 High</option>
</select>

<button onclick="addTask()">+ Add</button>

<div class="ball" id="ball">
  <div class="inner">
    <div id="result">Ask me…</div>
  </div>
</div>

<button onclick="decide()">✨ Decide</button>
<button onclick="completeTask()">✅ I did it</button>

<div class="streak" id="streak">🔥 Streak: 0</div>

<div class="drawer" id="drawer">
  <div class="handle"></div>
  <ul id="taskList"></ul>
</div>

<script>
let tasks=[];
let lastChoiceIndex=null;

function addTask(){
  const text=document.getElementById("taskInput").value;
  if(text.trim()){
    tasks.push({text});
    document.getElementById("taskInput").value="";
    render();
  }
}

function render(){
  taskList.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`${t.text} <button onclick="deleteTask(${i})">✕</button>`;
    taskList.appendChild(li);
  });
}

function deleteTask(i){
  tasks.splice(i,1);
  render();
}

function decide(){
  if(!tasks.length) return alert("Add tasks");

  ball.classList.add("pulse");

  setTimeout(()=>{
    const index=Math.floor(Math.random()*tasks.length);
    lastChoiceIndex=index;
    result.textContent="👉 "+tasks[index].text;
    ball.classList.remove("pulse");
    particles();
  },400);
}

function completeTask(){
  if(lastChoiceIndex!==null){
    tasks.splice(lastChoiceIndex,1);
    render();
  }
}

function particles(){
  for(let i=0;i<20;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*window.innerWidth+"px";
    p.style.top="60%";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

/* ✧ swipe FIXED */
let startY=0;

drawer.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

drawer.addEventListener("touchend",e=>{
  let diff=e.changedTouches[0].clientY - startY;

  if(diff < -40){
    drawer.classList.add("open");
  }
  if(diff > 40){
    drawer.classList.remove("open");
  }
});

render();
</script>

</body>
</html>
