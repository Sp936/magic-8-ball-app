<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#140033,#000);
  color:#fff;

  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ✧ APP LAYOUT */
.app{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:100vh;
  padding:10px 0;
}

/* ✧ TOP SECTION */
.top{
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ✧ MIDDLE */
.middle{
  display:flex;
  justify-content:center;
  align-items:center;
  flex:1;
}

/* ✧ BOTTOM */
.bottom{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:10px;
}

/* HEADER */
.header {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  margin-top:10px;
}

.header-ball {
  width:70px;height:70px;
  border-radius:50%;
  background: radial-gradient(circle,#1a1a1a,#000);
  box-shadow:0 0 30px #7c3aed, 0 0 60px #ec4899;
  display:flex;align-items:center;justify-content:center;
  animation:float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.header-core {
  width:30px;height:30px;
  border-radius:50%;
  background:radial-gradient(circle,#c084fc,#6366f1);
  box-shadow:0 0 20px #c084fc;
}

h1 {
  font-size:1.9rem;
  margin:0;
  background:linear-gradient(90deg,#fff,#f472b6,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INSTRUCTIONS */
.instructions{
  width:85%;max-width:400px;
  margin:12px auto;
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  cursor:pointer;
  text-align:left;
}

.instructions p{
  display:none;
  font-size:0.9rem;
  line-height:1.4;
}

.instructions.active p{
  display:block;
}

/* INPUT */
input,select{
  width:85%;max-width:400px;
  padding:14px;margin:8px;
  border-radius:14px;border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

button{
  padding:14px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;
  margin:6px;
}

/* BALL */
.ball{
  width:230px;height:230px;
  border-radius:50%;
  background:radial-gradient(circle,#0a0a0a,#000);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 60px rgba(124,58,237,1),
             0 0 120px rgba(236,72,153,0.6);
  animation:breath 4s ease-in-out infinite;
}

@keyframes breath{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.03);}
}

.ball.deciding{
  animation:decideSpin 0.9s linear infinite;
}

@keyframes decideSpin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.ball.donePulse{
  animation:donePulse 0.5s ease;
}

@keyframes donePulse{
  50%{transform:scale(1.12);}
}

.inner{
  width:120px;height:120px;
  background:linear-gradient(135deg,#6366f1,#c084fc);
  transform:rotate(45deg);
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#result{
  transform:rotate(-45deg);
  font-weight:bold;
}

.done {
  font-size:20px;
  color:#34d399;
}

/* TASKS */
li{
  margin:12px auto;
  background:#222;
  padding:16px;
  border-radius:16px;
  max-width:320px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
}

.task-text{
  text-align:left;
  width:100%;
  margin-bottom:8px;
}

.delete-btn{
  align-self:flex-end;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  border:none;
  border-radius:12px;
  padding:6px 10px;
  color:white;
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:8px;height:8px;
  border-radius:2px;
  animation:confettiFall 1s forwards;
}

@keyframes confettiFall{
  to{
    transform:translate(var(--x), var(--y)) rotate(720deg);
    opacity:0;
  }
}

/* SAVE */
.switch{
  width:40px;height:20px;
  background:#555;border-radius:20px;
  margin:10px auto;position:relative;
}
.switch::after{
  content:"";width:16px;height:16px;background:white;
  position:absolute;top:2px;left:2px;border-radius:50%;
  transition:0.2s;
}
.switch.active{background:#7c3aed;}
.switch.active::after{left:22px;}

.drawer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:15px;
  transform:translateY(calc(100% - 80px));
  transition:0.3s;
}
.drawer.open{ transform:translateY(0); }

.handle{
  width:80px;height:8px;
  background:linear-gradient(90deg,#7c3aed,#ec4899);
  margin:0 auto 12px;
  border-radius:10px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
}
.overlay.active{
  opacity:1;
  pointer-events:auto;
}

.streak{
  color:#ff9edb;
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="app">

  <div class="top">

    <div class="header">
      <div class="header-ball"><div class="header-core"></div></div>
      <h1>Magic Dopamine Ball</h1>
    </div>

    <div class="instructions" onclick="this.classList.toggle('active')">
      <strong>ℹ️ How to use</strong>
      <p>
        Add tasks → assign energy → set your current energy → press decide → follow it → build streak.
      </p>
    </div>

    <input id="taskInput" placeholder="Add task">

    <select id="energySelect">
      <option value="low">💤 Low</option>
      <option value="medium">⚡ Medium</option>
      <option value="high">🔥 High</option>
    </select>

    <button onclick="addTask()">+ Add</button>

  </div>

  <div class="middle">
    <div class="ball" id="ball">
      <div class="inner">
        <div id="result">Ask me…</div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <button onclick="decide()">✨ Decide</button>
    <button onclick="completeTask()">✅ I did it</button>
    <div class="streak" id="streak">🔥 Streak: 0</div>
  </div>

</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="handle" onclick="openDrawer()"></div>

  <div>💾 Save tasks</div>
  <div id="switch" class="switch" onclick="toggleSave()"></div>

  <ul id="taskList"></ul>
</div>

<script>
let saveMode = localStorage.getItem("saveMode") === "true";
let tasks = saveMode ? JSON.parse(localStorage.getItem("tasks")) || [] : [];
let lastChoiceIndex=null;
let streak=parseInt(localStorage.getItem("streak"))||0;

function toggleSave(){
  saveMode=!saveMode;
  switchEl.classList.toggle("active",saveMode);
  localStorage.setItem("saveMode",saveMode);
  save();
}

function save(){
  if(saveMode){
    localStorage.setItem("tasks",JSON.stringify(tasks));
  }
}

function addTask(){
  const text=taskInput.value;
  if(text.trim()){
    tasks.push({text});
    taskInput.value="";
    render();
    save();
  }
}

function render(){
  taskList.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`
      <span class="task-text">${t.text}</span>
      <button class="delete-btn" onclick="deleteTask(${i})">✕</button>
    `;
    taskList.appendChild(li);
  });
}

function deleteTask(i){
  tasks.splice(i,1);
  render();
  save();
}

function decide(){
  if(!tasks.length) return alert("Add tasks");

  ball.classList.add("deciding");

  setTimeout(()=>{
    const index=Math.floor(Math.random()*tasks.length);
    lastChoiceIndex=index;
    result.textContent="👉 "+tasks[index].text;
    ball.classList.remove("deciding");
  },900);
}

function completeTask(){
  if(lastChoiceIndex!==null){
    tasks.splice(lastChoiceIndex,1);
    lastChoiceIndex=null;
    render();
    save();
  }

  streak++;
  localStorage.setItem("streak",streak);
  streakEl.textContent="🔥 Streak: "+streak;

  result.textContent="✨ DONE ✨";
  ball.classList.add("donePulse");

  confettiBurst();

  setTimeout(()=>{
    ball.classList.remove("donePulse");
    result.textContent="Ask me…";
  },1000);
}

function confettiBurst(){
  for(let i=0;i<30;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.setProperty('--x',(Math.random()-0.5)*400+"px");
    c.style.setProperty('--y',(Math.random()-0.5)*500+"px");
    c.style.left=window.innerWidth/2+"px";
    c.style.top="60%";
    c.style.background=["#f472b6","#34d399","#facc15","#a78bfa"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1000);
  }
}

function openDrawer(){
  drawer.classList.add("open");
  overlay.classList.add("active");
}
function closeDrawer(){
  drawer.classList.remove("open");
  overlay.classList.remove("active");
}

const drawer=document.getElementById("drawer");
const overlay=document.getElementById("overlay");
const taskList=document.getElementById("taskList");
const taskInput=document.getElementById("taskInput");
const result=document.getElementById("result");
const ball=document.getElementById("ball");
const streakEl=document.getElementById("streak");
const switchEl=document.getElementById("switch");

switchEl.classList.toggle("active", saveMode);
render();
streakEl.textContent="🔥 Streak: "+streak;
</script>

</body>
</html>
