<!DOCTYPE html><html>
<head>
  <title>Magic 8 Ball ✨</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a0033, #000);
      color: white;
      text-align: center;
      padding: 20px;
    }h1 { font-size: 2.5rem; }

input, button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  font-size: 1rem;
}

input { width: 50%; }

button {
  background: #7c3aed;
  color: white;
  cursor: pointer;
}

ul { list-style: none; padding: 0; }

li {
  background: rgba(255,255,255,0.1);
  margin: 5px;
  padding: 8px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

.delete { background: transparent; color: #ff6b6b; }

.ball {
  width: 250px;
  height: 250px;
  margin: 30px auto;
  background: radial-gradient(circle at 30% 30%, #444, #000);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 40px rgba(124, 58, 237, 0.6);
}

.inner {
  width: 120px;
  height: 120px;
  background: #4f46e5;
  transform: rotate(45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 20px;
}

#result { transform: rotate(-45deg); }

  </style>
</head>
<body>  <h1>✨ Magic 8 Ball ✨</h1>  <input id="taskInput" placeholder="Task">  <select id="energy">
    <option value="low">💤 Low energy</option>
    <option value="medium">⚡ Medium</option>
    <option value="high">🔥 High</option>
  </select><button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>  <div class="ball">
    <div class="inner">
      <div id="result">Shake me</div>
    </div>
  </div><button onclick="decide()">🔮 Decide</button>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addTask() {
      const text = document.getElementById("taskInput").value;
      const energy = document.getElementById("energy").value;

      if (text.trim() !== "") {
        tasks.push({ text, energy });
        saveTasks();
        render();
      }
    }

    function deleteTask(i) {
      tasks.splice(i, 1);
      saveTasks();
      render();
    }

    function render() {
      const list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach((t, i) => {
        const li = document.createElement("li");
        li.textContent = `${t.text} (${t.energy})`;

        const btn = document.createElement("button");
        btn.textContent = "✕";
        btn.className = "delete";
        btn.onclick = () => deleteTask(i);

        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    function decide() {
      if (tasks.length === 0) return alert("Add tasks");

      const selectedEnergy = document.getElementById("energy").value;

      const filtered = tasks.filter(t => t.energy === selectedEnergy);

      const pool = filtered.length ? filtered : tasks;

      const choice = pool[Math.floor(Math.random() * pool.length)];

      document.getElementById("result").textContent = choice.text;
    }

    render();
  </script></body>
</html>
