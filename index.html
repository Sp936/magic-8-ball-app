<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>

  <link rel="icon" href="file_00000000eb2c72469b0cd174bf8953a5.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: radial-gradient(circle at top, #12002a, #000);
      color: #f5f5f5;
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      margin-top: 30px;
      font-weight: 700;
      background: linear-gradient(90deg, #ffffff, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    input, select {
      width: 85%;
      max-width: 400px;
      padding: 14px;
      margin: 8px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-weight: 500;
    }

    button {
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
      margin: 6px;
      font-size: 1rem;
      font-weight: 600;
    }

    .ball {
      width: 240px;
      height: 240px;
      margin: 20px 0 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 60px rgba(124,58,237,0.8);
    }

    .inner {
      width: 130px;
      height: 130px;
      background: linear-gradient(135deg, #6366f1, #c084fc);
      transform: rotate(45deg);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #result {
      transform: rotate(-45deg);
      font-weight: 700;
      color: #fff;
    }

    .streak {
      margin-top: 8px;
      color: #ff9edb;
      font-weight: 600;
    }

    /* ✧ toggle switch */
    .toggle {
      margin: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
    }

    .switch {
      position: relative;
      width: 40px;
      height: 20px;
      background: #555;
      border-radius: 20px;
      cursor: pointer;
    }

    .switch::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: 0.2s;
    }

    .switch.active {
      background: #7c3aed;
    }

    .switch.active::after {
      left: 22px;
    }

    /* ✧ instructions */
    .instructions {
      width: 85%;
      max-width: 400px;
      margin: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
    }

    .instructions p {
      display: none;
      font-size: 0.9rem;
      color: #ccc;
    }

    .instructions.active p {
      display: block;
    }

  </style>
</head>

<body>

<h1>🔮 Magic Dopamine Ball</h1>

<div class="container">

  <!-- ✧ instructions -->
  <div class="instructions" onclick="toggleInstructions(this)">
    ℹ️ How to use
    <p>Add your options, hit decide, and follow what it says. No overthinking.</p>
  </div>

  <input id="taskInput" placeholder="What are your options?">

  <select id="energy">
    <option value="low">💤 Low energy</option>
    <option value="medium">⚡ Medium energy</option>
    <option value="high">🔥 High energy</option>
  </select>

  <button onclick="addTask()">+ Add</button>

  <!-- ✧ toggle -->
  <div class="toggle">
    <div id="switch" class="switch" onclick="toggleSave()"></div>
    <span>Save tasks</span>
  </div>

  <div class="ball">
    <div class="inner">
      <div id="result">Ask me…</div>
    </div>
  </div>

  <button onclick="decide()">✨ Decide</button>

  <div class="streak" id="streak">🔥 Streak: 0</div>

  <button onclick="clearStreak()">Reset Streak</button>

</div>

<script>
let saveMode = localStorage.getItem("saveMode") === "true";
let tasks = saveMode ? JSON.parse(localStorage.getItem("tasks")) || [] : [];
let streak = parseInt(localStorage.getItem("streak")) || 0;

function save() {
  if (saveMode) localStorage.setItem("tasks", JSON.stringify(tasks));
  localStorage.setItem("streak", streak);
  localStorage.setItem("saveMode", saveMode);
}

function toggleSave() {
  saveMode = !saveMode;
  document.getElementById("switch").classList.toggle("active", saveMode);
  save();
}

function toggleInstructions(el) {
  el.classList.toggle("active");
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const energy = document.getElementById("energy").value;
  if (text.trim()) {
    tasks.push({ text, energy });
    save();
    document.getElementById("taskInput").value = "";
  }
}

function decide() {
  if (!tasks.length) return alert("Add tasks first");
  const choice = tasks[Math.floor(Math.random() * tasks.length)];
  document.getElementById("result").textContent = "👉 " + choice.text;
}

function clearStreak() {
  streak = 0;
  save();
  update();
}

function update() {
  document.getElementById("streak").textContent = `🔥 Streak: ${streak}`;
  document.getElementById("switch").classList.toggle("active", saveMode);
}

update();
</script>

</body>
</html>
