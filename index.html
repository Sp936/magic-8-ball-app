<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: radial-gradient(circle at top,#140033,#000);
  color: #fff;
  text-align: center;
}

/* ✧ HEADER */
.header-ball {
  width: 100px;
  height: 100px;
  margin: 20px auto 10px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #222, #000);
  box-shadow: 0 0 40px rgba(124,58,237,0.9);
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-inner {
  width:50px;
  height:50px;
  background:linear-gradient(135deg,#6366f1,#c084fc);
  transform:rotate(45deg);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.header-inner span {
  transform:rotate(-45deg);
  font-weight:bold;
}

h1 { font-size:1.8rem; }

/* ✧ INPUTS */
input, select {
  width: 85%;
  max-width: 400px;
  padding: 14px;
  margin: 8px;
  border-radius: 14px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
}

button {
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg,#7c3aed,#ec4899);
  color: white;
  margin: 6px;
}

/* ✧ BALL */
.ball {
  width: 220px;
  height: 220px;
  margin: 20px auto;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%,#1a1a1a,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow: 0 0 80px rgba(124,58,237,1);
}

.ball.pulse { box-shadow:0 0 120px rgba(236,72,153,1); }

.inner {
  width: 110px;
  height: 110px;
  background: linear-gradient(135deg,#6366f1,#c084fc);
  transform: rotate(45deg);
  border-radius: 20px;
  display:flex;
  align-items:center;
  justify-content:center;
}

#result {
  transform: rotate(-45deg);
  font-weight: bold;
}

/* ✧ INSTRUCTIONS */
.instructions {
  width:85%;
  max-width:400px;
  margin:10px auto;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  cursor:pointer;
}

.instructions p { display:none; }
.instructions.active p { display:block; }

/* ✧ DRAWER (highlighted) */
.drawer {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:15px;
  transform:translateY(75%);
  transition:0.3s;
  box-shadow:0 -5px 40px rgba(236,72,153,0.7);
}

.drawer.open { transform:translateY(0); }

.handle {
  width:60px;
  height:6px;
  background:linear-gradient(90deg,#7c3aed,#ec4899);
  border-radius:10px;
  margin:0 auto 10px;
  box-shadow:0 0 10px rgba(236,72,153,1);
}

li {
  display:flex;
  justify-content:space-between;
  margin:6px;
  background:#222;
  padding:10px;
  border-radius:10px;
}

.streak {
  margin-top:8px;
  color:#ff9edb;
  font-weight:600;
}

/* ✧ particles */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  animation: rise 0.8s linear forwards;
}

@keyframes rise {
  from { opacity:1; transform:translateY(0); }
  to { opacity:0; transform:translateY(-80px); }
}

</style>
</head>

<body>

<div class="header-ball">
  <div class="header-inner"><span>8</span></div>
</div>

<h1>Magic Dopamine Ball</h1>

<div class="instructions" onclick="this.classList.toggle('active')">
ℹ️ How to use
<p>Add tasks → choose energy → follow the result.</p>
</div>

<input id="taskInput" placeholder="Add task">

<select id="energy">
<option value="low">💤 Low</option>
<option value="medium">⚡ Medium</option>
<option value="high">🔥 High</option>
</select>

<button onclick="addTask()">+ Add</button>

<div class="ball" id="ball">
  <div class="inner">
    <div id="result">Ask me…</div>
  </div>
</div>

<button onclick="decide()">✨ Decide</button>
<button onclick="completeTask()">✅ I did it</button>

<div class="streak" id="streak">🔥 Streak: 0</div>

<div class="drawer" id="drawer">
  <div class="handle"></div>
  <ul id="taskList"></ul>
</div>

<audio id="popSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<script>
let tasks = [];
let lastChoiceIndex = null;
let streak = parseInt(localStorage.getItem("streak")) || 0;

function updateStreak(){
  document.getElementById("streak").textContent = "🔥 Streak: " + streak;
}

function addTask(){
  const text = taskInput.value;
  const energy = energy.value;
  if(text.trim()){
    tasks.push({text,energy});
    taskInput.value="";
    render();
  }
}

function render(){
  taskList.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`${t.text} <button onclick="deleteTask(${i})">✕</button>`;
    taskList.appendChild(li);
  });
}

function deleteTask(i){
  tasks.splice(i,1);
  render();
}

function decide(){
  if(!tasks.length) return alert("Add tasks");

  const ball=document.getElementById("ball");
  ball.classList.add("pulse");

  document.getElementById("popSound").play();
  if(navigator.vibrate) navigator.vibrate(40);

  setTimeout(()=>{
    const index = Math.floor(Math.random()*tasks.length);
    const choice = tasks[index];

    lastChoiceIndex = index;

    result.textContent="👉 "+choice.text;
    ball.classList.remove("pulse");

    particles();
  },400);
}

function completeTask(){
  if(lastChoiceIndex !== null){
    tasks.splice(lastChoiceIndex,1);
    lastChoiceIndex = null;
    render();
  }

  streak++;
  localStorage.setItem("streak",streak);
  updateStreak();

  if(navigator.vibrate) navigator.vibrate([100,50,150]);
  particles();
}

function particles(){
  for(let i=0;i<20;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*window.innerWidth+"px";
    p.style.top="60%";
    p.style.background=["#f472b6","#a78bfa","#34d399","#facc15"][Math.floor(Math.random()*4)];
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

/* ✧ swipe drawer */
let startY=0;

drawer.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
});

drawer.addEventListener("touchmove",e=>{
  let currentY=e.touches[0].clientY;
  let diff=currentY-startY;

  if(diff < -50) drawer.classList.add("open");
  if(diff > 50) drawer.classList.remove("open");
});

updateStreak();
render();
</script>

</body>
</html>
