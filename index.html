<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✧ PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#140033,#000);
  color:#fff;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ✧ LAYOUT */
.app{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  min-height:100vh;
  padding:20px 0;
}

.top{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:16px;
}

.middle{
  display:flex;
  justify-content:center;
  align-items:center;
  flex:1;
}

.bottom{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  margin-bottom:120px; /* ✧ keeps buttons visible */
}

/* ✧ HEADER */
.header{
  display:flex;
  align-items:center;
  gap:14px;
}

.header-ball{
  width:70px;height:70px;
  border-radius:50%;
  background: radial-gradient(circle,#1a1a1a,#000);
  box-shadow:0 0 30px #7c3aed,0 0 60px #ec4899;
  display:flex;align-items:center;justify-content:center;
}

.header-core{
  width:30px;height:30px;
  border-radius:50%;
  background:radial-gradient(circle,#c084fc,#6366f1);
  box-shadow:0 0 20px #c084fc;
}

h1{
  font-size:1.8rem;
  margin:0;
  background:linear-gradient(90deg,#fff,#f472b6,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ✧ INSTRUCTIONS */
.instructions{
  width:85%;max-width:400px;
  padding:16px;
  border-radius:16px;
  background:rgba(255,255,255,0.06);
  cursor:pointer;
}
.instructions p{display:none;font-size:0.9rem;line-height:1.5;}
.instructions.active p{display:block;}

/* ✧ INPUT */
input,select{
  width:85%;max-width:400px;
  padding:14px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

/* ✧ BUTTON */
button{
  padding:14px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:white;
}

/* ✧ BALL */
.ball{
  width:180px;height:180px;
  border-radius:50%;
  background:radial-gradient(circle,#000,#111);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 80px #7c3aed,0 0 140px #ec4899;
}

.ball.deciding{
  animation:shake 0.6s infinite;
}

@keyframes shake{
  0%{transform:rotate(0deg);}
  25%{transform:rotate(10deg);}
  50%{transform:rotate(-8deg);}
  75%{transform:rotate(12deg);}
  100%{transform:rotate(0);}
}

.inner{
  width:100px;height:100px;
  background:linear-gradient(135deg,#6366f1,#c084fc);
  transform:rotate(45deg);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
}

#result{
  transform:rotate(-45deg);
  font-weight:bold;
}

/* ✧ TASK LIST */
li{
  margin:10px auto;
  max-width:320px;
  background:#222;
  padding:14px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
}

.task-text{text-align:left;}
.delete-btn{
  background:#ec4899;
  border:none;
  border-radius:8px;
  padding:6px 10px;
}

/* ✧ DRAWER */
.drawer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:15px;
  transform:translateY(calc(100% - 80px));
  transition:0.3s;
}
.drawer.open{transform:translateY(0);}

.handle{
  width:80px;height:8px;
  background:linear-gradient(90deg,#7c3aed,#ec4899);
  margin:0 auto 12px;
  border-radius:10px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
}
.overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* ✧ SAVE SWITCH */
.switch{
  width:40px;height:20px;
  background:#555;
  border-radius:20px;
  margin:10px auto;
  position:relative;
}
.switch::after{
  content:"";
  width:16px;height:16px;
  background:white;
  position:absolute;
  top:2px;left:2px;
  border-radius:50%;
  transition:0.2s;
}
.switch.active{background:#7c3aed;}
.switch.active::after{left:22px;}

.streak{color:#ff9edb;}
</style>
</head>

<body>

<div class="app">

<div class="top">

<div class="header">
<div class="header-ball"><div class="header-core"></div></div>
<h1>Magic Dopamine Ball</h1>
</div>

<div class="instructions" onclick="this.classList.toggle('active')">
<strong>ℹ️ How to use</strong>
<p>
Add tasks → assign energy → set your current energy → press decide → follow it → build streak.<br><br>
Save mode keeps your tasks.
</p>
</div>

<input id="taskInput" placeholder="Add task">

<select id="energySelect">
<option value="low">💤 Low</option>
<option value="medium">⚡ Medium</option>
<option value="high">🔥 High</option>
</select>

<button onclick="addTask()">+ Add</button>

</div>

<div class="middle">
<div class="ball" id="ball">
<div class="inner">
<div id="result">Ask me…</div>
</div>
</div>
</div>

<div class="bottom">
<button onclick="decide()">✨ Decide</button>
<button onclick="completeTask()">✅ I did it</button>
<div class="streak" id="streak">🔥 Streak: 0</div>
</div>

</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
<div class="handle" onclick="openDrawer()"></div>

<div>💾 Save tasks</div>
<div id="switch" class="switch" onclick="toggleSave()"></div>

<ul id="taskList"></ul>
</div>

<script>
let saveMode = localStorage.getItem("saveMode")==="true";
let tasks = saveMode ? JSON.parse(localStorage.getItem("tasks"))||[] : [];
let streak=parseInt(localStorage.getItem("streak"))||0;
let lastChoiceIndex=null;

function toggleSave(){
  saveMode=!saveMode;
  switchEl.classList.toggle("active",saveMode);
  localStorage.setItem("saveMode",saveMode);
  save();
}

function save(){
  if(saveMode){
    localStorage.setItem("tasks",JSON.stringify(tasks));
  }
}

function addTask(){
  const text=taskInput.value;
  const energy=energySelect.value;
  if(text.trim()){
    tasks.push({text,energy});
    taskInput.value="";
    render();
    save();
  }
}

function render(){
  taskList.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`
      <span class="task-text">${t.text}</span>
      <button class="delete-btn" onclick="deleteTask(${i})">✕</button>
    `;
    taskList.appendChild(li);
  });
}

function deleteTask(i){
  tasks.splice(i,1);
  render();
  save();
}

function decide(){
  if(!tasks.length) return alert("Add tasks");

  ball.classList.add("deciding");

  setTimeout(()=>{
    const index=Math.floor(Math.random()*tasks.length);
    lastChoiceIndex=index;
    result.textContent="👉 "+tasks[index].text;
    ball.classList.remove("deciding");
  },800);
}

function completeTask(){
  if(lastChoiceIndex!==null){
    tasks.splice(lastChoiceIndex,1);
    lastChoiceIndex=null;
    render();
    save();
  }

  streak++;
  localStorage.setItem("streak",streak);
  streakEl.textContent="🔥 Streak: "+streak;
}

function openDrawer(){
  drawer.classList.add("open");
  overlay.classList.add("active");
}
function closeDrawer(){
  drawer.classList.remove("open");
  overlay.classList.remove("active");
}

/* ✧ INIT */
const drawer=document.getElementById("drawer");
const overlay=document.getElementById("overlay");
const taskList=document.getElementById("taskList");
const taskInput=document.getElementById("taskInput");
const energySelect=document.getElementById("energySelect");
const result=document.getElementById("result");
const ball=document.getElementById("ball");
const streakEl=document.getElementById("streak");
const switchEl=document.getElementById("switch");

switchEl.classList.toggle("active",saveMode);
render();
streakEl.textContent="🔥 Streak: "+streak;

/* ✧ PWA */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
