<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>

  <link rel="icon" href="file_00000000eb2c72469b0cd174bf8953a5.png">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#7c3aed">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: radial-gradient(circle at top, #12002a, #000);
      color: white;
      text-align: center;
    }

    h1 {
      font-size: 2.4rem;
      margin-top: 30px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      padding: 10px 20px 0 20px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    input, select {
      width: 85%;
      max-width: 400px;
      padding: 14px;
      margin: 8px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    button {
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
      margin: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    .secondary {
      background: rgba(255,255,255,0.1);
    }

    ul {
      width: 90%;
      max-width: 400px;
      padding: 0;
      list-style: none;
    }

    li {
      background: rgba(255,255,255,0.06);
      margin: 6px 0;
      padding: 12px;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
    }

    .ball {
      width: 240px;
      height: 240px;
      margin: 20px 0 10px 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset -20px -20px 40px rgba(0,0,0,0.9),
        0 0 60px rgba(124,58,237,0.8);
    }

    .inner {
      width: 130px;
      height: 130px;
      background: linear-gradient(135deg, #6366f1, #c084fc);
      transform: rotate(45deg);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #result {
      transform: rotate(-45deg);
      font-weight: bold;
    }

    .doneBtn {
      background: #22c55e;
      display: none;
    }

    .streak {
      margin-top: 8px;
      margin-bottom: 10px;
      color: #f472b6;
    }
  </style>
</head>

<body>

<h1>🔮 Magic Dopamine Ball</h1>

<div class="container">

  <input id="taskInput" placeholder="What are your options?">

  <select id="energy">
    <option value="low">💤 Low energy</option>
    <option value="medium">⚡ Medium energy</option>
    <option value="high">🔥 High energy</option>
  </select>

  <button onclick="addTask()">+ Add</button>

  <button class="secondary" onclick="toggleSave()">
    💾 Toggle Save Mode
  </button>

  <ul id="taskList"></ul>

  <div class="ball">
    <div class="inner">
      <div id="result">Ask me…</div>
    </div>
  </div>

  <button onclick="decide()">✨ Decide</button>
  <button id="doneBtn" class="doneBtn" onclick="completeTask()">✅ I did it</button>

  <div class="streak" id="streak">🔥 Streak: 0</div>

  <button class="secondary" onclick="clearStreak()">Reset Streak</button>

</div>

<script>
let saveMode = localStorage.getItem("saveMode") === "true";

let tasks = saveMode
  ? JSON.parse(localStorage.getItem("tasks")) || []
  : [];

let streak = parseInt(localStorage.getItem("streak")) || 0;

function save() {
  if (saveMode) {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }
  localStorage.setItem("streak", streak);
  localStorage.setItem("saveMode", saveMode);
}

function toggleSave() {
  saveMode = !saveMode;
  save();
  alert(saveMode ? "Saving ON" : "Saving OFF");
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const energy = document.getElementById("energy").value;

  if (text.trim() !== "") {
    tasks.push({ text, energy });
    document.getElementById("taskInput").value = "";
    save();
    render();
  }
}

function deleteTask(i) {
  tasks.splice(i, 1);
  save();
  render();
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((t, i) => {
    const li = document.createElement("li");
    li.textContent = `${t.text}`;

    const btn = document.createElement("button");
    btn.textContent = "✕";
    btn.onclick = () => deleteTask(i);

    li.appendChild(btn);
    list.appendChild(li);
  });

  document.getElementById("streak").textContent = `🔥 Streak: ${streak}`;
}

function decide() {
  if (tasks.length === 0) return alert("Add tasks");

  const selectedEnergy = document.getElementById("energy").value;

  let pool = tasks;

  if (selectedEnergy === "low") {
    pool = tasks.filter(t => t.energy === "low");
  }

  if (selectedEnergy === "medium") {
    pool = tasks.filter(t => t.energy !== "high");
  }

  const choice = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById("result").textContent = "👉 " + choice.text;
  document.getElementById("doneBtn").style.display = "inline-block";
}

function completeTask() {
  streak++;
  save();
  render();
  document.getElementById("doneBtn").style.display = "none";
}

function clearStreak() {
  streak = 0;
  save();
  render();
}

render();
</script>

</body>
</html>
