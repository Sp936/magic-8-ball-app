<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>

  <link rel="icon" href="file_00000000eb2c72469b0cd174bf8953a5.png">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#7c3aed">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #12002a, #000);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    /* ✧ subtle animated background glow */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(124,58,237,0.2), transparent 60%);
      animation: pulse 8s infinite ease-in-out;
      z-index: -1;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 0.7; }
    }

    h1 {
      font-size: 2.2rem;
      margin-top: 20px;
      background: linear-gradient(90deg, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .container {
      width: 100%;
      min-height: 100vh;
      padding: 20px;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    input, select {
      width: 85%;
      max-width: 400px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      backdrop-filter: blur(10px);
      font-size: 1rem;
    }

    button {
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(167,139,250,0.5);
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.95);
    }

    ul {
      width: 90%;
      max-width: 400px;
      padding: 0;
      list-style: none;
    }

    li {
      background: rgba(255,255,255,0.06);
      margin: 6px 0;
      padding: 12px;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .delete {
      background: none;
      color: #ff6b6b;
      font-size: 1.2rem;
    }

    /* ✧ upgraded 8 ball */
    .ball {
      width: 260px;
      height: 260px;
      margin: 25px 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset -20px -20px 40px rgba(0,0,0,0.9),
        inset 10px 10px 30px rgba(255,255,255,0.1),
        0 0 80px rgba(124,58,237,0.8);
    }

    .inner {
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #6366f1, #c084fc);
      transform: rotate(45deg);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
    }

    #result {
      transform: rotate(-45deg);
      font-weight: bold;
      font-size: 1.1rem;
      padding: 10px;
    }

    .shake {
      animation: shake 0.6s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
      100% { transform: translateX(0); }
    }

    .doneBtn {
      background: #22c55e;
      display: none;
    }

    .streak {
      margin-top: 10px;
      color: #f472b6;
      font-size: 1.1rem;
    }
  </style>
</head>

<body>

<h1>🔮 Magic Dopamine Ball</h1>

<div class="container">

  <input id="taskInput" placeholder="What are your options?">

  <select id="energy">
    <option value="low">💤 Low energy</option>
    <option value="medium">⚡ Medium energy</option>
    <option value="high">🔥 High energy</option>
  </select>

  <button onclick="addTask()">+ Add</button>

  <ul id="taskList"></ul>

  <div id="ball" class="ball">
    <div class="inner">
      <div id="result">Ask me…</div>
    </div>
  </div>

  <button onclick="decide()">✨ Decide</button>
  <button id="doneBtn" class="doneBtn" onclick="completeTask()">✅ I did it</button>

  <div class="streak" id="streak">🔥 Streak: 0</div>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let streak = parseInt(localStorage.getItem("streak")) || 0;

function save() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
  localStorage.setItem("streak", streak);
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const energy = document.getElementById("energy").value;

  if (text.trim() !== "") {
    tasks.push({ text, energy });
    document.getElementById("taskInput").value = "";
    save();
    render();
  }
}

function deleteTask(i) {
  tasks.splice(i, 1);
  save();
  render();
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach((t, i) => {
    const li = document.createElement("li");
    li.textContent = `${emoji(t.energy)} ${t.text}`;

    const btn = document.createElement("button");
    btn.textContent = "✕";
    btn.className = "delete";
    btn.onclick = () => deleteTask(i);

    li.appendChild(btn);
    list.appendChild(li);
  });

  document.getElementById("streak").textContent = `🔥 Streak: ${streak}`;
}

function emoji(e) {
  if (e === "low") return "💤";
  if (e === "medium") return "⚡";
  return "🔥";
}

function tinyStep(task) {
  return "👉 Just start: " + task;
}

function decide() {
  if (tasks.length === 0) return alert("Add tasks");

  const ball = document.getElementById("ball");
  ball.classList.add("shake");

  const selectedEnergy = document.getElementById("energy").value;

  let pool = [];

  if (selectedEnergy === "low") {
    pool = tasks.filter(t => t.energy === "low");
  }

  if (selectedEnergy === "medium") {
    pool = tasks.filter(t => t.energy === "low" || t.energy === "medium");
  }

  if (selectedEnergy === "high") {
    pool = tasks;
  }

  if (pool.length === 0) pool = tasks;

  setTimeout(() => {
    const choice = pool[Math.floor(Math.random() * pool.length)];

    document.getElementById("result").textContent = tinyStep(choice.text);
    document.getElementById("doneBtn").style.display = "inline-block";

    ball.classList.remove("shake");
  }, 600);
}

function completeTask() {
  streak++;
  save();
  render();
  document.getElementById("doneBtn").style.display = "none";
}

render();
</script>

</body>
</html>
