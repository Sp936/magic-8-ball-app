<!DOCTYPE html>
<html>
<head>
  <title>Magic Dopamine Ball ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle at top,#140033,#000);
  color:#fff;
  text-align:center;
}

/* HEADER */
.header {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-top:20px;
}

.header-ball {
  width:60px;height:60px;
  border-radius:50%;
  background: radial-gradient(circle,#222,#000);
  box-shadow:0 0 25px rgba(124,58,237,1);
  display:flex;align-items:center;justify-content:center;
}

.header-inner {
  width:30px;height:30px;
  background:linear-gradient(135deg,#6366f1,#c084fc);
  transform:rotate(45deg);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
}

.header-inner span {
  transform:rotate(-45deg);
  font-size:12px;
  font-weight:bold;
}

h1 { font-size:1.8rem; }

/* INPUT */
input,select{
  width:85%;max-width:400px;
  padding:14px;margin:8px;
  border-radius:14px;border:none;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

button{
  padding:14px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;
  margin:6px;
}

/* BALL */
.ball{
  width:220px;height:220px;
  margin:20px auto;
  border-radius:50%;
  background:radial-gradient(circle,#1a1a1a,#000);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 80px rgba(124,58,237,1);
}
.ball.pulse{box-shadow:0 0 120px rgba(236,72,153,1);}

.inner{
  width:110px;height:110px;
  background:linear-gradient(135deg,#6366f1,#c084fc);
  transform:rotate(45deg);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
}
#result{transform:rotate(-45deg);font-weight:bold;}

/* DONE animation */
.done {
  font-size:20px;
  color:#34d399;
  animation:pop 0.4s ease;
}
@keyframes pop {
  0% { transform: scale(0.6) rotate(-45deg); opacity: 0; }
  100% { transform: scale(1) rotate(-45deg); opacity: 1; }
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.2s;
}
.overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* DRAWER */
.drawer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:15px;
  transform:translateY(calc(100% - 80px));
  transition:0.3s;
  box-shadow:0 -5px 40px rgba(236,72,153,0.7);
}
.drawer.open{ transform:translateY(0); }

.handle{
  width:80px;height:8px;
  background:linear-gradient(90deg,#7c3aed,#ec4899);
  margin:0 auto 12px;
  border-radius:10px;
}

/* ✧ TASKS FIXED */
li{
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  margin:10px auto;
  background:#222;
  padding:14px;
  border-radius:14px;
  max-width:350px;
}

/* centered text */
.task-text{
  text-align:center;
  width:100%;
}

/* delete button floats right */
.delete-btn{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  border:none;
  border-radius:10px;
  padding:6px 10px;
  color:white;
}

.switch{
  width:40px;height:20px;
  background:#555;border-radius:20px;
  margin:10px auto;position:relative;
}
.switch::after{
  content:"";width:16px;height:16px;background:white;
  position:absolute;top:2px;left:2px;border-radius:50%;
  transition:0.2s;
}
.switch.active{background:#7c3aed;}
.switch.active::after{left:22px;}

.streak{color:#ff9edb;margin-top:10px;}

.particle{
  position:fixed;width:6px;height:6px;
  border-radius:50%;
  animation:rise 0.8s linear forwards;
}
@keyframes rise{
  from{opacity:1}
  to{transform:translateY(-80px);opacity:0}
}
</style>
</head>

<body>

<div class="header">
  <div class="header-ball">
    <div class="header-inner"><span>8</span></div>
  </div>
  <h1>Magic Dopamine Ball</h1>
</div>

<input id="taskInput" placeholder="Add task">

<select id="energySelect">
<option value="low">💤 Low</option>
<option value="medium">⚡ Medium</option>
<option value="high">🔥 High</option>
</select>

<button onclick="addTask()">+ Add</button>

<div class="ball" id="ball">
  <div class="inner">
    <div id="result">Ask me…</div>
  </div>
</div>

<button onclick="decide()">✨ Decide</button>
<button onclick="completeTask()">✅ I did it</button>

<div class="streak" id="streak">🔥 Streak: 0</div>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="handle" onclick="openDrawer()"></div>

  <div>💾 Save tasks</div>
  <div id="switch" class="switch" onclick="toggleSave()"></div>

  <ul id="taskList"></ul>
</div>

<script>
let saveMode = localStorage.getItem("saveMode") === "true";
let tasks = saveMode ? JSON.parse(localStorage.getItem("tasks")) || [] : [];
let lastChoiceIndex=null;
let streak=parseInt(localStorage.getItem("streak"))||0;

function openDrawer(){
  drawer.classList.add("open");
  overlay.classList.add("active");
}
function closeDrawer(){
  drawer.classList.remove("open");
  overlay.classList.remove("active");
}

function toggleSave(){
  saveMode=!saveMode;
  switchEl.classList.toggle("active",saveMode);
  localStorage.setItem("saveMode",saveMode);
  save();
}
function save(){
  if(saveMode){
    localStorage.setItem("tasks",JSON.stringify(tasks));
  }
}

function addTask(){
  const text=document.getElementById("taskInput").value;
  const energy=document.getElementById("energySelect").value;

  if(text.trim()){
    tasks.push({text,energy});
    document.getElementById("taskInput").value="";
    render();
    save();
  }
}

function deleteTask(i){
  tasks.splice(i,1);
  render();
  save();
}

function render(){
  taskList.innerHTML="";
  tasks.forEach((t,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`
      <span class="task-text">${t.text}</span>
      <button class="delete-btn" onclick="deleteTask(${i})">✕</button>
    `;
    taskList.appendChild(li);
  });
}

function decide(){
  if(!tasks.length) return alert("Add tasks");

  ball.classList.add("pulse");

  setTimeout(()=>{
    const index=Math.floor(Math.random()*tasks.length);
    lastChoiceIndex=index;
    result.textContent="👉 "+tasks[index].text;
    ball.classList.remove("pulse");
    particles();
  },400);
}

function completeTask(){
  if(lastChoiceIndex!==null){
    tasks.splice(lastChoiceIndex,1);
    lastChoiceIndex=null;
    render();
    save();
  }

  streak++;
  localStorage.setItem("streak",streak);
  streakEl.textContent="🔥 Streak: "+streak;

  result.textContent="✨ DONE ✨";
  result.classList.add("done");

  ball.classList.add("pulse");

  particles(40);

  setTimeout(()=>{
    result.classList.remove("done");
    ball.classList.remove("pulse");
    result.textContent="Ask me…";
  },1000);
}

function particles(amount=20){
  for(let i=0;i<amount;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*window.innerWidth+"px";
    p.style.top="60%";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

const drawer=document.getElementById("drawer");
const overlay=document.getElementById("overlay");
const switchEl=document.getElementById("switch");
const taskList=document.getElementById("taskList");
const result=document.getElementById("result");
const ball=document.getElementById("ball");
const streakEl=document.getElementById("streak");

switchEl.classList.toggle("active", saveMode);
render();
streakEl.textContent="🔥 Streak: "+streak;
</script>

</body>
</html>
